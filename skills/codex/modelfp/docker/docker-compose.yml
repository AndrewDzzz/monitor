services:
  modelfp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        INSTALL_ML_DEPS: "false"
    image: modelfp:latest
    container_name: modelfp-runner
    # strace generally needs SYS_PTRACE and relaxed seccomp inside Docker.
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
      - no-new-privileges:true
    # Safer default: no network during runtime. Pre-download HF snapshots outside this container.
    network_mode: "none"
    read_only: true
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /workspace/tmp:size=512m,mode=1777
    volumes:
      - ../workspace/models:/workspace/models:ro
      - ../workspace/target:/workspace/target:ro
      - ../workspace/out:/workspace/out:rw
    environment:
      MODELFP_TIMEOUT: "180"
      MODELFP_CANARY_TOKEN: "MODELFP_CANARY_DO_NOT_USE"
    command:
      - --model-repo
      - /workspace/models/model
      - --target-script
      - /workspace/target/run_model.py
      - --out
      - /workspace/out
